<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de cadastro Avançado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        h4 {
            background-image: linear-gradient(to right, rgb(57, 141, 238), rgb(44, 32, 211));
            padding: 0;
        }

        .titulo-form {
            color: #FF0000;
        }

        form {
            background-color: #b3d7da;
            padding: 20px;
        }

        form {
            background-color: burlywood;
        }

        .navbar-text {

           
            padding: 20px;
            text-align: center;
            background-color: rgb(184, 189, 189);
          
        }

        .navbar {
            position: fixed;
            font-size: 25px;
        }

        
    footer {
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 25px;
        font-size: 25px;
        background-color: rgb(184, 189, 189);
        text-align: center;
    }
        

        .btn-success{
            background-color: green;
        }

        .submit:hover{
            background-color: blue;
        }

        input:hover{
        
            border: 2px solid blue; 
        }

       
    </style>
</head>

<body>

    
    <nav class="navbar">
        <span class="navbar-text">
            Cadastro Gamer
        </span>
    </nav>


    <p style="text-align: center;">
        <a href="https://www.cadastroavancado.com.br">
            <img src="img/kuraminha.png" title="kuraminha" width="30%" height="30%"></a>
    </p>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">

                    <div class="card-header text-center">
                        <h4>Página de cadastro avançado</h4>
                    </div>
                    <div class="card-body">

                        <form action="#" method="post">

                            <h5 class="mb-3">Informações Pessoais</h5>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="nome" class="form-label">Nome Completo</label>
                                    <input type="text" class="form-control" id="nome" name="nome"
                                        placeholder="Seu nome completo" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="dataNascimento">Data de Nascimento:</label>
                                    <input type="date" id="dataNascimento" name="dataNascimento" min="1900-01-01"
                                        max="2025-12-31" requerid>

                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">E-mail</label>
                                    <input type="email" class="form-control" id="email" name="email"
                                        placeholder="nome@exemplo.com" required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label for="senha" class="form-label">Senha</label>
                                    <input type="password" class="form-control" id="senha" name="senha" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="confirmar-senha" class="form-label">Confirme sua Senha</label>
                                    <input type="password" class="form-control" id="confirmar-senha"
                                        name="confirmar-senha" required>
                                </div>
                            </div>

                            <label for="sessao">Escolha a plataforma preferida:</label>
                            <select id="sessao" name="sessao">
                                <option value="pc">PC</option>
                                <option value="console">FPS</option>
                                <option value="mobile">Mobile</option>
                            </select>

                            <br><br>

                            <p>Selecione seu gênero:</p>
                            <div>
                                <input type="radio" id="masculino" name="genero" value="masculino">
                                <label for="masculino">Masculino</label>
                            </div>
                            <div>
                                <input type="radio" id="feminino" name="genero" value="feminino">
                                <label for="feminino">Feminino</label>
                            </div>
                            <div>
                                <input type="radio" id="prefiro não informar" name="genero"
                                    value="prefiro não informar">
                                <label for="prefiro não informar">Prefiro não informar.</label>
                            </div>

                            <br>

                            <p>Selecione suas opções de interesse:</p>
                            <div>
                                <input type="checkbox" id="rpg" name="opcoes[]" value="rpg">
                                <label for="rpg">RPG</label>
                            </div>
                            <div>
                                <input type="checkbox" id="console" name="opcoes[]" value="console">
                                <label for="console">FPS</label>
                            </div>
                            <div>
                                <input type="checkbox" id="moba" name="opcoes[]" value="moba">
                                <label for="moba">MOBA</label>
                            </div>
                            <div>
                                <input type="checkbox" id="estrategia" name="opcoes[]" value="estrategia">
                                <label for="estrategia">estrategia</label>
                            </div>

                            <div>
                                <input type="checkbox" id="casual" name="opcoes[]" value="casual">
                                <label for="casual">Casual</label>
                            </div>

                            <br>

                            <label for="comentarios" class="form-label">Comentários Adicionais:</label>
                            <textarea class="form-control" id="comentarios" name="comentarios" rows="3"
                                placeholder="Insira seus comentários aqui..." required></textarea>

                            <hr>



                            <div>
                                <input type="checkbox" id="termos" name="opcoes[]" value="termos" required>
                                <label for="termos">Li e concordo com os Termos</label>
                            </div>



                            <button type="submit" class="btn btn-success submit">Enviar Inscrição</button>
                            <button type="reset" class="btn btn-success">Limpar</button>

                            <br>



                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div id="footer_items">
            <span id="copyright">
                &copy; 2025 Cadastro Gamer Todos os direitos reservados.
            </span>

        </div>
    </footer>
</body>

</html>
