<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prova - Brenda Mendes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/pokemonForm.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center">
                        <h4>Formulário de inscrição - Evento Pokémon</h4>
                    </div>

                    <div class="card-body">
                        <img class="imagem mb-3 d-block mx-auto" src="img/pokemon.webp" width="50%">

                        <form action="#" method="post">

                            <div class="mb-3">
                                <label class="form-label">Nome:</label>
                                <input type="text" class="form-control" name="nome" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Idade:</label>
                                <input type="number" class="form-control" name="idade" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">E-mail:</label>
                                <input type="email" class="form-control" name="email" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Senha:</label>
                                <input type="password" class="form-control" name="senha" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Confirmar senha:</label>
                                <input type="password" class="form-control" name="confirmarSenha" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Escolha a sessão:</label>
                                <select class="form-select" name="sessao" required>
                                    <option value="">Selecione</option>
                                    <option value="manha">Manhã</option>
                                    <option value="tarde">Tarde</option>
                                    <option value="noite">Noite</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <h5>Faixa Etária:</h5>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="faixa" value="jovem" required>
                                    <label class="form-check-label">Jovem</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="faixa" value="adulto">
                                    <label class="form-check-label">Adulto</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="faixa" value="senior">
                                    <label class="form-check-label">Sênior</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <h5>Interesse de eventos:</h5>
                                <div class="form-check" >
                                    <input class="form-check-input" type="checkbox" name="interesse[]" value="batalhas" >
                                    <label class="form-check-label">Batalhas</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="interesse[]" value="trocas">
                                    <label class="form-check-label">Trocas</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="interesse[]" value="cosplay">
                                    <label class="form-check-label">Cosplay</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="interesse[]" value="palestras">
                                    <label class="form-check-label">Palestras</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Observações:</label>
                                <textarea class="form-control" rows="3" ></textarea>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Enviar</button>
                                <button type="reset" class="btn btn-secondary">Limpar</button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
