<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicio</title>
</head>
<body>

    <script>
        const nome = prompt('Digite seu nome');
        document.body.innerHTML =  `O seu nome é: ${nome}<br />`
        document.body.innerHTML =  `O seu nome tem ${nome.length} letras:<br />`
        document.body.innerHTML =  `A segunda letra do seu nome é: ${nome[1]}<br />`
        document.body.innerHTML += `Qual o primerio índice da letra a do seu nome ${nome.indexOf('b')}<br />`;
        document.body.innerHTML += `Qual o último índice da letra no seu nome? ${nome.lastIndexOf('a')}<br />`;
        document.body.innerHTML += `As últimas 3 letras do seu nome são:  ${nome.slice(-3, nome.length)}<br />`;
        document.body.innerHTML += `As palavras do seu nome são:${nome.split(' ')}<br />`;
        document.body.innerHTML += `Seu nome com letras maiúsculas: ${nome.toUpperCase()}<br />`;
        document.body.innerHTML += `Seu nome com letras minúsculas: ${nome.toLowerCase()}<br />`;


    </script>
    
</body>
</html>
